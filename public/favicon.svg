<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="leather" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#6b4a2e"/>
      <stop offset="100%" stop-color="#3a2818"/>
    </radialGradient>
  </defs>
  <!-- parchment ring -->
  <circle cx="32" cy="32" r="30" fill="#f4ecd8"/>
  <!-- leather medallion -->
  <circle cx="32" cy="32" r="26" fill="url(#leather)" stroke="#1d130a" stroke-width="1.25"/>
  <!-- inner inset ring -->
  <circle cx="32" cy="32" r="22.5" fill="none" stroke="rgba(244,236,216,0.22)" stroke-width="1"/>
  <!-- anchor glyph -->
  <g fill="none" stroke="#f4ecd8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- ring at top -->
    <circle cx="32" cy="17" r="3.4"/>
    <!-- shank -->
    <line x1="32" y1="20.4" x2="32" y2="46"/>
    <!-- stock (crossbar) -->
    <line x1="23" y1="24.5" x2="41" y2="24.5"/>
    <!-- curved arms / flukes -->
    <path d="M 17 36 Q 18 48 32 48 Q 46 48 47 36"/>
    <!-- fluke tips -->
    <line x1="17" y1="36" x2="13" y2="32"/>
    <line x1="47" y1="36" x2="51" y2="32"/>
  </g>
</svg>
